name: call-github2gerrit-reusable-workflow

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
    inputs:
      PR_NUMBER:
        description: "PR number to process; 0 processes all open PRs"
        required: false
        default: "0"
        type: string
      GERRIT_CHANGE_URL:
        description: "Gerrit change URL from a Gerrit event dispatch"
        required: false
        default: ""
        type: string
      GERRIT_EVENT_TYPE:
        description: "Gerrit event type (e.g. change-merged)"
        required: false
        default: ""
        type: string
      GERRIT_BRANCH:
        description: "Target branch override from a Gerrit event dispatch"
        required: false
        default: ""
        type: string
  pull_request_target:
    types: [opened, reopened, edited, synchronize, closed]
    branches:
      - master
      - main
  push:
    branches: [main, master]

concurrency:
  # yamllint disable-line rule:line-length
  group: ${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: true

jobs:
  call-in-g2g-workflow:
    permissions:
      contents: read
      pull-requests: write
      issues: write
    # yamllint disable-line rule:line-length
    uses: lfreleng-actions/github2gerrit-action/.github/workflows/github2gerrit.yaml@9f32f3c5c93c53176d0fedf23622c897f1d739f5 # v1.4.2
    with:
      GERRIT_KNOWN_HOSTS: ${{ vars.GERRIT_KNOWN_HOSTS }}
      GERRIT_SSH_USER_G2G: ${{ vars.GERRIT_SSH_USER_G2G }}
      GERRIT_SSH_USER_G2G_EMAIL: ${{ vars.GERRIT_SSH_USER_G2G_EMAIL }}
      ORGANIZATION: ${{ vars.ORGANIZATION }}
      PR_NUMBER: ${{ inputs.PR_NUMBER || '0' }}
      GERRIT_CHANGE_URL: ${{ inputs.GERRIT_CHANGE_URL || '' }}
      GERRIT_EVENT_TYPE: ${{ inputs.GERRIT_EVENT_TYPE || '' }}
      GERRIT_BRANCH: ${{ inputs.GERRIT_BRANCH || '' }}
    secrets:
      GERRIT_SSH_PRIVKEY_G2G: ${{ secrets.GERRIT_SSH_PRIVKEY_G2G }}
